<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>悪役令嬢シーンジェネレーター v2</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Noto Sans JP', sans-serif; background: #0c0c12; color: #e8e6e3; }
    .glass { background: rgba(20,20,30,0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.06); }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
    .btn { padding: 8px 16px; border-radius: 9999px; font-size: 12px; font-weight: 700; transition: all 0.2s; cursor: pointer; }
    .btn-primary { background: linear-gradient(135deg,#8b5cf6,#6d28d9); color: #fff; }
    .btn-primary:hover { box-shadow: 0 4px 20px rgba(139,92,246,0.4); transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
    .btn-ghost { background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #ccc; }
    .btn-ghost:hover { background: rgba(255,255,255,0.12); }
    .input-dark { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); color: #e8e6e3; border-radius: 12px; padding: 10px 14px; font-size: 13px; }
    .input-dark:focus { background: rgba(255,255,255,0.08); border-color: rgba(139,92,246,0.5); outline: none; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>
</html>
